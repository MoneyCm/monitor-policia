name: Monitor MinDefensa

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restaurar estado anterior
        uses: actions/cache@v4
        with:
          path: mindefensa_state.json
          key: mindefensa-state-${{ github.run_id }}
          restore-keys: |
            mindefensa-state-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Ejecutar monitor
        id: monitor
        run: python monitor.py

      - name: Enviar correo si hay cambios
        if: steps.monitor.outputs.hay_cambios == 'true'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python notificar.py

      - name: Guardar estado actualizado
        if: always()
        uses: actions/cache/save@v4
        with:
          path: mindefensa_state.json
          key: mindefensa-state-${{ github.run_id }}