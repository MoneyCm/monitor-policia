name: Monitor Policía Nacional — Jamundí

on:
  schedule:
    # 1. Ejecución diaria 7:00 AM Colombia (12:00 UTC)
    - cron: "0 12 * * *"
    # 2. Refuerzo Martes 6:00 PM Col (23:00 UTC)
    - cron: "0 23 * * 2"
    # 3. Refuerzo Viernes 6:00 PM Col (23:00 UTC)
    - cron: "0 23 * * 5"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          pip install requests pandas openpyxl python-calamine matplotlib reportlab

      - name: Descargar datos Policía
        run: python descargar_policia.py

      - name: Generar Boletín PDF
        run: python generar_reporte_policia.py

      - name: Notificar por Correo
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          EMAIL_DEST: ${{ secrets.EMAIL_DEST }}
        run: |
          # Determinar tipo según el evento
          TIPO="diario"
          if [[ "${{ github.event.schedule }}" == "0 23 * * 2" ]]; then TIPO="reunion"; fi
          if [[ "${{ github.event.schedule }}" == "0 23 * * 5" ]]; then TIPO="consejo"; fi
          python notificar_policia.py $TIPO
