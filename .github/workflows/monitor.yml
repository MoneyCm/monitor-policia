name: Monitor MinDefensa
on:
  schedule:
    - cron: "*/15 * * * *"
    - cron: "0 23 * * 2"
    - cron: "0 23 * * 5"
  workflow_dispatch:
jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Restaurar estado anterior
        uses: actions/cache@v4
        with:
          path: mindefensa_state.json
          key: mindefensa-state-${{ github.run_id }}
          restore-keys: |
            mindefensa-state-
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium
      - name: Ejecutar monitor
        id: monitor
        run: python monitor.py
      - name: Generar reporte PDF
        if: steps.monitor.outputs.hay_cambios == 'true' || github.event.schedule == '0 23 * * 2' || github.event.schedule == '0 23 * * 5'
        run: python generar_reporte.py
      - name: Enviar correo con reporte
        if: steps.monitor.outputs.hay_cambios == 'true' || github.event.schedule == '0 23 * * 2' || github.event.schedule == '0 23 * * 5'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python notificar.py
      - name: Guardar estado actualizado
        if: always()
        uses: actions/cache/save@v4
        with:
          path: mindefensa_state.json
          key: mindefensa-state-${{ github.run_id }}
