name: Monitor Policia Nacional - Jamundi

on:
  schedule:
    - cron: "0 12 * * *"
    - cron: "0 23 * * 2"
    - cron: "0 23 * * 5"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
    env:
      PYTHONUNBUFFERED: "1"
      PLAYWRIGHT_TIMEOUT: "90000"
      PLAYWRIGHT_SLOW_MO: "150"

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Instalar Chromium para Playwright
        run: python -m playwright install --with-deps chromium

      - name: Calcular fingerprint remoto
        id: fp
        shell: bash
        env:
          PYTHONUNBUFFERED: "1"
          POLICIA_FP_MODE: "1"
          POLICIA_FP_DELITOS_MAX: "12"
          POLICIA_FP_WORKERS: "10"
          POLICIA_FP_TIMEOUT: "8"
        run: |
          python descargar_policia.py --fingerprint | tee fp.out
          FP="$(tail -n 1 fp.out)"
          echo "hash=$FP" >> "$GITHUB_OUTPUT"
          echo "Fingerprint: $FP"

      - name: Cache policia_xlsx + estado (por fingerprint)
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            policia_xlsx
            .monitor_state
          key: policia-cache-${{ steps.fp.outputs.hash }}
          restore-keys: |
            policia-cache-

      - name: Decidir si ejecutar descarga completa
        id: cambios
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ steps.cache.outputs.cache-hit }}" = "true" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Preparar resumen anterior (si existe)
        if: steps.cambios.outputs.changed == 'true'
        shell: bash
        run: |
          mkdir -p .monitor_state
          if [ -f .monitor_state/resumen_actual.json ]; then
            cp .monitor_state/resumen_actual.json resumen_anterior.json
          fi

      - name: Descargar datos Policia
        if: steps.cambios.outputs.changed == 'true'
        timeout-minutes: 25
        env:
          # Limita el espacio de combinaciones en Actions (la pagina a veces lista 200+ delitos).
          POLICIA_DELITOS_MAX: "40"
          # Puedes fijar una lista exacta (coma-separada) si quieres 100% determinismo:
          # POLICIA_DELITOS: "Amenazas,Delitos sexuales,Extorsión,Homicidios,Hurto a personas,Hurto a residencias,Hurto de automotores,Hurto de motocicletas,Lesiones personales,Violencia intrafamiliar,Secuestro,Terrorismo,Piratería terrestre,Abigeato"
        run: python descargar_policia.py

      - name: Generar boletin PDF
        if: steps.cambios.outputs.changed == 'true'
        run: python generar_reporte_policia.py

      - name: Notificar por correo si hubo cambios
        if: steps.cambios.outputs.changed == 'true'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          EMAIL_DEST: ${{ secrets.EMAIL_DEST }}
        shell: bash
        run: |
          TIPO="diario"
          if [[ "${{ github.event.schedule }}" == "0 23 * * 2" ]]; then TIPO="planificacion"; fi
          if [[ "${{ github.event.schedule }}" == "0 23 * * 5" ]]; then TIPO="consejo"; fi
          python notificar_policia.py "$TIPO"

      - name: Guardar nuevo estado
        if: steps.cambios.outputs.changed == 'true' && hashFiles('resumen_actual.json') != ''
        shell: bash
        run: |
          mkdir -p .monitor_state
          cp resumen_actual.json .monitor_state/resumen_actual.json

      - name: Subir artefactos cuando cambia
        if: steps.cambios.outputs.changed == 'true' || failure()
        uses: actions/upload-artifact@v4
        with:
          name: reporte-policia
          path: |
            reporte_policia.pdf
            resumen_actual.json
            graf_comp_policia.png
            graf_tend_policia.png
            fallo_*.png
