name: Monitor Policía Nacional — Jamundí

on:
  schedule:
    # 1. Chequeo frecuente (cada 30 min) para detectar cambios al instante
    - cron: "*/30 * * * *"
    # 2. Ventana Martes 21:00 UTC (4:00 PM Col) para Planeación
    - cron: "0 21 * * 2"
    # 3. Ventana Viernes 21:00 UTC (4:00 PM Col) para Consejo
    - cron: "0 21 * * 5"

  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Restaurar caché de Hash
        uses: actions/cache@v4
        with:
          path: .last_hash
          key: last-hash-policia-${{ github.run_id }}
          restore-keys: |
            last-hash-policia-

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restaurar caché de Hash y Resumen
        uses: actions/cache@v4
        with:
          path: |
            .last_hash
            resumen_anterior.json
          key: cache-policia-${{ github.run_id }}
          restore-keys: |
            cache-policia-

      - name: Verificar cambios y notificar
        id: check_changes
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          EMAIL_DEST: ${{ secrets.EMAIL_DEST }}
        run: |
          HASH_ACTUAL=$(find policia_xlsx -name "*.xlsx" -exec md5sum {} \; 2>/dev/null | sort | md5sum | cut -d' ' -f1)
          if [ -f .last_hash ]; then HASH_PREVIO=$(cat .last_hash); else HASH_PREVIO=""; fi

          if [ "$HASH_ACTUAL" != "$HASH_PREVIO" ]; then
            echo "$HASH_ACTUAL" > .last_hash

            # Notificar según horario
            if [[ "${{ github.event.schedule }}" == "0 21 * * 2" ]]; then
              python notificar_policia.py planificacion
            elif [[ "${{ github.event.schedule }}" == "0 21 * * 5" ]]; then
              python notificar_policia.py consejo
            else
              python notificar_policia.py cambio
            fi

            # Mover actual a anterior para la PRÓXIMA vez
            if [ -f resumen_actual.json ]; then cp resumen_actual.json resumen_anterior.json; fi
          fi

